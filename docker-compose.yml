version: '3.8'
services:
  api:
    container_name: api
    build:
      context: ./apps/api
      dockerfile: src/Portfolio.Api/Dockerfile
    ports:
      - "5000:80"
      - "5808:8080"
    env_file: ".env"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - DB_HOST=db
      - AI_PROVIDER=${AI_PROVIDER:-Ollama}
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://ollama:11434}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadminpassword
      - S3_BUCKET_NAME=portfolio-media
    depends_on:
      - db
      - minio

  web:
    container_name: web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:8080
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5808
    depends_on:
      - api

  db:
    container_name: db
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  geoip:
    image: ghcr.io/observabilitystack/geoip-api:latest
    container_name: geoip
    restart: always
    ports:
      - "8080:8080"

  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  ollama_data: