# Docker Compose for E2E test environment
# Brings up Postgres, the GeoIP service, and the C# API.
# The Next.js dev server is run directly by Playwright's webServer config.
# MinIO is omitted — e2e tests don't exercise file upload flows.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: user
      POSTGRES_PASSWORD: e2e_test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  geoip:
    image: ghcr.io/observabilitystack/geoip-api:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/json/8.8.8.8 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: src/Portfolio.Api/Dockerfile
    ports:
      - "5808:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: db
      DB_NAME: portfolio
      DB_USER: user
      DB_PASSWORD: e2e_test_password
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadminpassword
      S3_BUCKET_NAME: portfolio-media
    depends_on:
      db:
        condition: service_healthy
    # No container-side healthcheck — the aspnet slim image has no curl/wget.
    # Readiness is polled from the runner host in the CI "Wait for API" step.

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
