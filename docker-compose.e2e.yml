# Docker Compose for E2E test environment
# Brings up Postgres, the GeoIP service, and the C# API.
# The Next.js dev server is run directly by Playwright's webServer config.
# MinIO is omitted — e2e tests don't exercise file upload flows.

name: e2e-portfolio

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: user
      POSTGRES_PASSWORD: e2e_test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  geoip:
    image: ghcr.io/observabilitystack/geoip-api:latest
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/json/8.8.8.8 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: src/Portfolio.Api/Dockerfile
    ports:
      - "5809:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: db
      AI_PROVIDER: ${AI_PROVIDER:-Ollama}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://ollama:11434}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DB_NAME: portfolio
      DB_USER: user
      DB_PASSWORD: e2e_test_password
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadminpassword
      S3_BUCKET_NAME: portfolio-media
      S3_PUBLIC_URL: http://127.0.0.1:9002/portfolio-media
    depends_on:
      db:
        condition: service_healthy
    # No container-side healthcheck — the aspnet slim image has no curl/wget.
    # Readiness is polled from the runner host in the CI "Wait for API" step.

  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:rocm
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    restart: unless-stopped

volumes:
  minio_data:
  ollama_data:
