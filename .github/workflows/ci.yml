name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Test Suite (C# / .NET 10)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('apps/api/Directory.Packages.props', 'apps/api/src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Dependencies
      run: dotnet restore apps/api/Portfolio.sln

    - name: Build Solution
      run: dotnet build apps/api/Portfolio.sln --no-restore -c Release

    - name: Run Backend Tests with Coverage
      run: |
        dotnet test apps/api/Portfolio.sln --no-build -c Release --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:Threshold=50 \
          /p:ThresholdType=line \
          /p:ThresholdStat=Total

    - name: Upload Backend Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage
        path: apps/api/src/Portfolio.Tests/coverage.cobertura.xml

  frontend-build:
    name: Frontend Build & Lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Frontend Application
      run: pnpm run build

  frontend-tests:
    name: Frontend Unit Tests (Jest / RTL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Frontend Tests with Coverage
      run: pnpm run test --coverage --watchAll=false

    - name: Upload Frontend Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage
        path: apps/web/coverage/

  playwright-e2e:
    name: Frontend E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: pnpm run test:e2e

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: apps/web/playwright-report/
        retries-on-error: true


