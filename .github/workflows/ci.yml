name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Test Suite (C# / .NET 10)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('apps/api/Directory.Packages.props', 'apps/api/src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Dependencies
      run: dotnet restore apps/api/Portfolio.sln

    - name: Build Solution
      run: dotnet build apps/api/Portfolio.sln --no-restore -c Release

    - name: Run Backend Tests
      run: dotnet test apps/api/Portfolio.sln --no-build -c Release --verbosity normal

  frontend-build:
    name: Frontend Build & Lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Frontend Application
      run: pnpm run build
