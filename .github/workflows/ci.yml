name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Test Suite (C# / .NET 10)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('apps/api/Directory.Packages.props', 'apps/api/src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Dependencies
      run: dotnet restore apps/api/Portfolio.sln

    - name: Build Solution
      run: dotnet build apps/api/Portfolio.sln --no-restore -c Release

    - name: Run Backend Tests with Coverage
      run: |
        dotnet test apps/api/Portfolio.sln --no-build -c Release --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:Threshold=50 \
          /p:ThresholdType=line \
          /p:ThresholdStat=Total

    - name: Upload Backend Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results
        path: apps/api/src/Portfolio.Tests/TestResults/test-results.trx

    - name: Upload Backend Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-coverage
        path: apps/api/src/Portfolio.Tests/coverage.cobertura.xml

  frontend-build:
    name: Frontend Build & Lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Frontend Application
      run: pnpm run build

  frontend-tests:
    name: Frontend Unit Tests (Jest / RTL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Frontend Tests with Coverage
      run: pnpm run test --coverage --watchAll=false --json --outputFile=jest-results.json

    - name: Upload Frontend Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-test-results
        path: apps/web/jest-results.json

    - name: Upload Frontend Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage
        path: apps/web/coverage/

  playwright-e2e:
    name: Frontend E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: apps/web/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Start E2E Services (Postgres + GeoIP + API)
      working-directory: .
      run: docker compose -f docker-compose.e2e.yml up --build -d

    - name: Wait for API to be ready
      run: |
        echo "Polling API on host port 5808..."
        for i in $(seq 1 40); do
          if curl -sf http://localhost:5808/api/resume/active > /dev/null 2>&1; then
            echo "API is ready after $i attempts."
            exit 0
          fi
          echo "  attempt $i: not ready yet, waiting 5s..."
          sleep 5
        done
        echo "API did not become ready in time. Dumping logs:"
        docker compose -f docker-compose.e2e.yml logs api
        exit 1

    - name: Run Playwright Tests
      env:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5808
        NEXT_PUBLIC_GEOIP_SERVICE_URL: http://localhost:8080/json/
      run: pnpm run test:e2e

    - name: Dump Service Logs on Failure
      if: failure()
      working-directory: .
      run: docker compose -f docker-compose.e2e.yml logs

    - name: Tear Down E2E Services
      if: always()
      working-directory: .
      run: docker compose -f docker-compose.e2e.yml down --volumes

    - name: Upload Playwright Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: apps/web/playwright-results.json

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: apps/web/playwright-report/
        retries-on-error: true

