name: Portfolio Continuous Deployment

on:
  workflow_run:
    workflows: ["Portfolio CI/CD Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Trigger Deployments
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Trigger Web API Render Deploy
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_API }}" ]; then
          echo "Triggering Render API deployment..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
        else
          echo "RENDER_DEPLOY_HOOK_API secret is not set, skipping API trigger."
        fi

    - name: Trigger Frontend Vercel Deploy
      run: |
        echo "Vercel deployments are handled natively via the Vercel GitHub integration."
        echo "Merging to main automatically triggers a production deployment in Vercel."

    - name: Create GitHub Deployment
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Creating GitHub deployment..."
        DEPLOYMENT_ID=$(echo '{"ref": "main", "description": "Automatic deployment after successful CI checks", "required_contexts": []}' | \
          gh api repos/${{ github.repository }}/deployments --input - --jq '.id')
        echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
        
        # Set status to in_progress
        gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
          -f state=in_progress \
          -f description="Deployments triggered, verifying health..." \
          -f log_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    - name: Verify Deployments are Live
      id: verify
      run: |
        echo "Waiting 60 seconds for initial deployment sync..."
        sleep 60
        
        if [ -n "${{ secrets.PROD_API_URL }}" ]; then
          echo "Checking API health at ${{ secrets.PROD_API_URL }}..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PROD_API_URL }}/api/resume/active")
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 404 ]; then
              echo "API is responsive and live!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "API verification timed out!"
              exit 1
            fi
            echo "Waiting 10s... (Status: $STATUS)"
            sleep 10
          done
        else
          echo "PROD_API_URL secret not set. Skipping API verification."
        fi
        
        if [ -n "${{ secrets.PROD_WEB_URL }}" ]; then
          echo "Checking Frontend health at ${{ secrets.PROD_WEB_URL }}..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PROD_WEB_URL }}")
            if [ "$STATUS" -eq 200 ]; then
              echo "Frontend is responsive and live!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend verification timed out!"
              exit 1
            fi
            echo "Waiting 10s... (Status: $STATUS)"
            sleep 10
          done
        else
          echo "PROD_WEB_URL secret not set. Skipping Frontend verification."
        fi

    - name: Update GitHub Deployment Status (Success)
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
          -f state=success \
          -f description="Deployments successfully verified and live." \
          -f log_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    - name: Update GitHub Deployment Status (Failure)
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "$DEPLOYMENT_ID" ]; then
          gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f state=failure \
            -f description="Deployments failed verification or timed out." \
            -f log_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        else
          echo "No deployment ID found, skipping status update."
        fi

    - name: Generate Status Summary Card
      if: always()
      run: |
        echo "### Deployment Report 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.verify.outcome }}" = "success" ]; then
          echo "#### ✅ Status: **Success**" >> $GITHUB_STEP_SUMMARY
          echo "All services are verified live and responsive." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | 🟢 Live |" >> $GITHUB_STEP_SUMMARY
          echo "| Web API (Render) | 🟢 Live |" >> $GITHUB_STEP_SUMMARY
        else
          echo "#### ❌ Status: **Failure**" >> $GITHUB_STEP_SUMMARY
          echo "One or more services failed verification or timed out during deployment check." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | 🔴 Unverified / Offline |" >> $GITHUB_STEP_SUMMARY
          echo "| Web API (Render) | 🔴 Unverified / Offline |" >> $GITHUB_STEP_SUMMARY
        fi
